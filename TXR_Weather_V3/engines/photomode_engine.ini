;==================================================
; TXR Weather Mod: "Photomode" Engine.ini base profile
; Rebuilt 2026-07 (shipped with 3.3.0). Fixes over the old profile:
; , sky/clouds reflect in car paint again (stale skyless probes bypassed)
; : TSR anti-ghosting restored + static-pattern fix on bright lights
; : GI blotch/shimmer fixes (surface cache back to sane sizes)
; , photographic night highlights (reflection ray intensity un-clamped)
; , crisper VSM shadows (fixed ray counts, tighter dither)
; , anti-flicker temporal tuning for reflections and GI
; The installer appends the mod-required cvars (exposure/fog) on top.
;==================================================

[/Script/Engine.Engine]
bSmoothFrameRate=0
MaxSmoothedFrameRate=500
MinSmoothedFrameRate=5

[ConsoleVariables]

;--------------------------------------------------
; 1. QUALITY BASE
;--------------------------------------------------
r.MaxQualityMode=1
r.DetailMode=3
r.MaterialQualityLevel=3
r.CapsuleMaxDirectOcclusionDistance=0
r.CapsuleMaxIndirectOcclusionDistance=0
r.HFShadowQuality=0
r.LightShaftQuality=1
r.ParticleLightQuality=2
r.RayTracing.Translucency.Shadows=0
r.SSS.SampleSet=0
r.SSS.Checkerboard=2
r.SSS.Filter=1
r.TranslucencyVolumeBlur=0
r.FastBlurThreshold=3
r.SceneColorFringeQuality=0
r.LensFlareQuality=2
r.DefaultFeature.LensFlare=1
r.VRS.Enable=0

;--------------------------------------------------
; 2. ANTI ALIASING: TSR
;--------------------------------------------------
r.AntialiasingMethod=4
r.ScreenPercentage=100
r.TemporalAA.Upsampling=1

r.TSR.History.ScreenPercentage=200
r.TSR.History.SampleCount=8
r.TSR.History.UpdateQuality=3
; FIX static pattern on bright lights: full-precision history.
; R11G11B10 history quantizes converged bright emissive into patterns.
r.TSR.History.R11G11B10=0

r.TSR.RejectionAntiAliasingQuality=2
r.TSR.ShadingRejection.Flickering=1

; FIX dark ghosting trails: restore history clamp on moving pixels.
; A near-zero value here disables TSR anti-ghosting almost entirely.
r.TSR.Velocity.WeightClampingSampleCount=2.0

; Clarity. Negative MipMapLODBias under TSR causes texture crawl/shimmer;
; TSR already biases mips from the 200% history.
r.MipMapLODBias=0
r.Tonemapper.Sharpen=0.5

;--------------------------------------------------
; 3. REFLECTIONS
;--------------------------------------------------
; FIX no sky/clouds in car paint: the reflection-environment pass
; composites stale skyless probes over Lumen. Confirmed fix (=0).
r.ReflectionEnvironment=0
; Do not feed those same stale probes into ray-hit lighting either.
r.Lumen.HardwareRayTracing.HitLighting.ReflectionCaptures=0
; Live skylight cubemap so Lumen rays that miss geometry see clouds.
r.SkyLight.RealTimeReflectionCapture=1
r.SkyLight.RealTimeReflectionCapture.TimeSlice=1

r.Lumen.Reflections.AsyncCompute=1
r.Lumen.Reflections.DownsampleFactor=1
r.Lumen.Reflections.TraceMeshSDFs=1
r.Lumen.Reflections.ScreenTraces=1
r.Lumen.Reflections.HierarchicalScreenTraces.MaxIterations=4

; FIX missing photographic highlights (night/dusk paint): low values
; clamp reflected light sources to dull blobs. 40 = engine default.
r.Lumen.Reflections.MaxRayIntensity=40
; Trace real reflections on rougher surfaces too (default 0.4).
r.Lumen.Reflections.MaxRoughnessToTrace=0.4
r.Lumen.Reflections.SmoothBias=1
r.Lumen.Reflections.GGXSamplingBias=0.6
r.Lumen.Reflections.Contrast=1.0
r.Lumen.Reflections.SpecularScale=1.0
r.Lumen.Reflections.SampleSceneColorNormalTreshold=85

r.Lumen.Reflections.BilateralFilter=1
r.Lumen.Reflections.BilateralFilter.DepthWeightScale=1000
r.Lumen.Reflections.BilateralFilter.NormalAngleThresholdScale=1.5
r.Lumen.Reflections.BilateralFilter.SpatialKernelRadius=0.01
r.Lumen.Reflections.RadianceCache.AngleThresholdScale=0.01
r.Lumen.Reflections.ScreenSpaceReconstruction.RoughnessScale=0.8
r.Lumen.Reflections.Temporal=1
r.Lumen.Reflections.Temporal.DistanceThreshold=0.0008
; Anti-flicker: shorter reflection history so speed-blur artifacts on
; roadside reflections clear quickly.
r.Lumen.Reflections.Temporal.MaxFramesAccumulated=8

;--------------------------------------------------
; 4. LUMEN GI
;--------------------------------------------------
r.Lumen.DiffuseIndirect.AsyncCompute=1
r.Lumen.DiffuseIndirect.SSAO=1
r.Lumen.HardwareRayTracing=1
r.Lumen.HardwareRayTracing.Inline=1
r.Lumen.HardwareRayTracing.LightingMode=3
r.Lumen.HardwareRayTracing.HitLighting.ShadowMode=1
r.Lumen.RadianceCache.HardwareRayTracing.TemporaryBufferAllocationDownsampleFactor=0
r.Lumen.RadianceCache.NumFramesToKeepCachedProbes=3
r.Lumen.RadianceCache.SortTraceTiles=0

; ScreenProbeGather core
r.Lumen.ScreenProbeGather.DownsampleFactor=16
r.Lumen.ScreenProbeGather.HardwareRayTracing=1
r.Lumen.ScreenProbeGather.DiffuseIntegralMethod=0
; FIX GI shimmer: importance sampling on, full gather resolution,
; bilinear instead of stochastic interpolation.
r.Lumen.ScreenProbeGather.ImportanceSample=1
r.Lumen.ScreenProbeGather.ImportanceSample.IncomingLighting=1
r.Lumen.ScreenProbeGather.ImportanceSample.MinPDFToTrace=0.2
r.Lumen.ScreenProbeGather.GatherOctahedronResolutionScale=1.0
r.Lumen.ScreenProbeGather.StochasticInterpolation=0
r.Lumen.ScreenProbeGather.ReferenceMode=0
; GI firefly/shimmer fixes (2026-07-13): spatial denoise at the engine
; default, per-ray radiance clamped (one hot ray into a lamp = flickering
; specks on dark ceilings), longer temporal history, fast-update mode only
; on real lighting motion.
r.Lumen.ScreenProbeGather.SpatialFilterNumPasses=3
r.Lumen.ScreenProbeGather.MaxRayIntensity=10
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=8
r.Lumen.ScreenProbeGather.Filtering.WaveOps=0
r.Lumen.ScreenProbeGather.FullResolutionJitterWidth=1
r.Lumen.ScreenProbeGather.ShortRangeAO.ApplyDuringIntegration=0
r.Lumen.ScreenProbeGather.SpatialFilterMaxRadianceHitAngle=60
r.Lumen.ScreenProbeGather.SpatialFilterPositionWeightScale=500
r.Lumen.ScreenProbeGather.TwoSidedFoliageBackfaceDiffuse=1
r.Lumen.ScreenProbeGather.ScreenTraces=1
r.Lumen.ScreenProbeGather.ScreenTraces.HZBTraversal=1
r.Lumen.ScreenProbeGather.ScreenTraces.HZBTraversal.HistoryDepthTestRelativeThickness=0.002

; ScreenProbeGather temporal. Anti-lag: short GI history + fast update
; on moving lighting (fixes under-car glow trails from own taillights).
r.Lumen.ScreenProbeGather.Temporal=1
r.Lumen.ScreenProbeGather.Temporal.MaxFramesAccumulated=16
r.Lumen.ScreenProbeGather.Temporal.MaxRayDirections=16
r.Lumen.ScreenProbeGather.Temporal.DistanceThreshold=0.005
r.Lumen.ScreenProbeGather.Temporal.FastUpdateModeUseNeighborhoodClamp=1
r.Lumen.ScreenProbeGather.Temporal.FractionOfLightingMovingForFastUpdateMode=0.1
r.Lumen.ScreenProbeGather.Temporal.RelativeSpeedDifferenceToConsiderLightingMoving=0.005
r.Lumen.ScreenProbeGather.TemporalFilterProbes=1

; Short range AO
r.Lumen.ScreenProbeGather.ShortRangeAO=0
r.Lumen.ScreenProbeGather.ShortRangeAO.ScreenSpace.FoliageOcclusionStrength=1.2
r.Lumen.ScreenProbeGather.ShortRangeAO.Temporal=1

; Surface cache. FIX GI blotch/shimmer: atlas at default 4096 and no
; card resolution caps.
r.LumenScene.SurfaceCache.AtlasSize=4096
r.LumenScene.SurfaceCache.CardMinResolution=8
r.LumenScene.SurfaceCache.CardCapturesPerFrame=300
r.LumenScene.SurfaceCache.CardCaptureFactor=16
r.LumenScene.SurfaceCache.Feedback.MinPageHits=32
r.LumenScene.SurfaceCache.Feedback.UniqueElements=4096
r.LumenScene.SurfaceCache.MeshCardsMergeInstances=1
r.LumenScene.SurfaceCache.NumFramesToKeepUnusedPages=128
r.LumenScene.SurfaceCache.RemovesPerFrame=128
r.LumenScene.SurfaceCache.Capture.NaniteLODScaleFactor=0.15
r.LumenScene.SurfaceCache.Capture.NaniteMultiView=0
r.LumenScene.SurfaceCache.Compress=1

; Direct lighting. Fast update factor (anti-lag on moving lights) and
; 8 lights per tile (4 drops lights in tunnels with dense streetlights).
r.LumenScene.DirectLighting.Stochastic=1
r.LumenScene.DirectLighting.Stochastic.Temporal=1
r.LumenScene.DirectLighting.UpdateFactor=16
r.LumenScene.DirectLighting.MaxLightsPerTile=8
r.LumenScene.DirectLighting.OffscreenShadowing.TraceMeshSDFs=0

; Radiosity. UpdateFactor at default 64 (high values = slow bounce).
r.LumenScene.Radiosity.HemisphereProbeResolution=16
r.LumenScene.Radiosity.ProbeSpacing=8
r.LumenScene.Radiosity.UpdateFactor=64
r.LumenScene.Radiosity.ProbeOcclusion=1
r.LumenScene.Radiosity.ProbeOcclusionStrength=0.75
r.LumenScene.Radiosity.Temporal.MaxFramesAccumulated=16

r.LumenScene.FarField=1
r.LumenScene.FarField.MaxTraceDistance=500000.0
r.LumenScene.GlobalSDF.ClipmapExtent=2500
r.LumenScene.Lighting.ForceLightingUpdate=0
r.LumenScene.MeshCardsPerTask=384
r.LumenScene.PrimitivesPerTask=384
r.LumenScene.ParallelUpdate=0

; Skylight leaking control. Baselined from in-game tuning: roughness 1.0
; is the real max (the engine clamps, 10 looks identical); albedo matches
; the exposure module's slot value so boot state = runtime state.
r.Lumen.SkylightLeaking.Roughness=1.0
r.Lumen.SkylightLeaking.ReflectionAverageAlbedo=0.07

; Translucency volume + translucent reflections
r.Lumen.TranslucencyVolume.GridPixelSize=128
r.Lumen.TranslucencyVolume.GridDistributionZScale=4.0
r.Lumen.TranslucencyVolume.RadianceCache=0
r.Lumen.TranslucencyVolume.RadianceCache.ProbeResolution=8
r.Lumen.TranslucencyVolume.RadianceCache.GridResolution=16
r.Lumen.TranslucencyVolume.RadianceCache.ProbeAtlasResolutionInProbes=96
r.Lumen.TranslucencyReflections.FrontLayer.Allow=1
r.Lumen.TranslucencyReflections.FrontLayer.EnableForProject=0
r.Lumen.TranslucencyReflections.RadianceCache=1

; Denoisers
r.DiffuseIndirect.Denoiser=2
r.GlobalIllumination.Denoiser.TemporalAccumulation=1
r.Reflections.Denoiser=2
r.AmbientOcclusion.Compute=1
r.AmbientOcclusion.Compute.Smooth=1
r.AmbientOcclusion.Denoiser=2
r.AmbientOcclusion.Denoiser.TemporalAccumulation=1
r.AmbientOcclusionLevels=4
r.GTAO.PauseJitter=1
r.GTAO.SpatialFilter=0
r.GTAO.ThicknessBlend=0.8

;--------------------------------------------------
; 5. SHADOWS: VSM
;--------------------------------------------------
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.ForceOnlyVirtualShadowMaps=1
r.Shadow.Virtual.Cache=1
r.Shadow.Virtual.Cache.StaticSeparate=1
r.Shadow.Virtual.DistantLightMode=1
r.Shadow.Virtual.TranslucentQuality=1

; Pages / resolution
r.Shadow.Virtual.MaxPhysicalPages=16384
r.Shadow.Virtual.DynamicRes.MaxPagePoolLoadFactor=0.90
r.Shadow.Virtual.DynamicRes.MaxResolutionLodBias=2.0
r.Shadow.Virtual.ResolutionLodBiasDirectional=-2.0
r.Shadow.Virtual.ResolutionLodBiasDirectionalMoving=-2.0
r.Shadow.Virtual.ResolutionLodBiasLocal=0.0
r.Shadow.Virtual.ResolutionLodBiasLocalMoving=1.0

; Clipmap layout
r.Shadow.Virtual.Clipmap.FirstLevel=5
r.Shadow.Virtual.Clipmap.LastLevel=22
r.Shadow.Virtual.Clipmap.FirstCoarseLevel=14
r.Shadow.Virtual.Clipmap.LastCoarseLevel=18
r.Shadow.Virtual.Clipmap.ZRangeScale=1000.0
r.Shadow.Virtual.Clipmap.MinCameraViewportWidth=1920

; Culling
r.Shadow.Virtual.Clipmap.UseConservativeCulling=1
r.Shadow.Virtual.Clipmap.CullDynamicTightly=0
r.Shadow.Virtual.UseFarShadowCulling=0

; WPO behaviour
r.Shadow.Virtual.Clipmap.WPODisableDistance=1
r.Shadow.Virtual.Clipmap.WPODisableDistance.InvalidateOnScaleChange=1
r.Shadow.Virtual.Clipmap.WPODisableDistance.LodBias=3

; Page marking / borders
r.Shadow.Virtual.PageMarkingPixelStrideX=2
r.Shadow.Virtual.PageMarkingPixelStrideY=2
r.Shadow.Virtual.PageDilationBorderSizeDirectional=0.05
r.Shadow.Virtual.PageDilationBorderSizeLocal=0.05
r.Shadow.Virtual.CoarsePagePixelThresholdStatic=1.0
r.Shadow.Virtual.CoarsePagePixelThresholdDynamic=16.0
r.Shadow.Virtual.CoarsePagePixelThresholdDynamicNanite=4.0

; Non-Nanite VSM + HZB
r.Shadow.Virtual.NonNaniteVSM=1
r.Shadow.Virtual.NonNanite.IncludeInCoarsePages=1
r.Shadow.Virtual.NonNanite.UseHZB=1
r.Shadow.Virtual.NonNanite.UseRadiusThreshold=1
r.Shadow.Virtual.UseHZB=1

; SMRT filtering. FIX soft/dithered/noisy edges: fixed full ray count
; (adaptive drops rays at edges), low dither, tight light cone for
; harder, crisper shadows.
r.Shadow.Virtual.SMRT.AdaptiveRayCount=0
r.Shadow.Virtual.SMRT.RayCountDirectional=12
r.Shadow.Virtual.SMRT.SamplesPerRayDirectional=16
r.Shadow.Virtual.SMRT.RayCountLocal=12
r.Shadow.Virtual.SMRT.SamplesPerRayLocal=12
r.Shadow.Virtual.SMRT.MaxRayAngleFromLight=0.005
r.Shadow.Virtual.SMRT.TexelDitherScaleDirectional=0.25
r.Shadow.Virtual.SMRT.TexelDitherScaleLocal=2.0

; Classic shadow path (local lights / fallbacks)
r.Shadow.DistanceScale=2
r.Shadow.MaxResolution=4096
r.Shadow.MaxCSMResolution=4096
r.Shadow.MaxNumFarShadowCascades=0
r.Shadow.MaxNumPointShadowCacheUpdatesPerFrame=5
r.Shadow.MaxNumSpotShadowCacheUpdatesPerFrame=5
r.Shadow.MinResolution=32
r.Shadow.MinPreShadowResolution=8
r.Shadow.PreShadowResolutionFactor=0.3
r.Shadow.PreShadowFadeResolution=16
r.Shadow.FadeResolution=64
r.Shadow.FadeExponent=0.75
r.Shadow.MaxSoftKernelSize=10
r.Shadow.CSMShadowDistanceFadeoutMultiplier=1.0
r.Shadow.CSMDepthBias=10.0
r.Shadow.CSMReceiverBias=1.0
r.Shadow.CSMSlopeScaleDepthBias=3.0
r.Shadow.PointLightDepthBias=0.02
r.Shadow.PointLightSlopeScaleDepthBias=3.0
r.Shadow.RectLightDepthBias=0.025
r.Shadow.RectLightSlopeScaleDepthBias=2.5
r.Shadow.ShadowMaxSlopeScaleDepthBias=1.0
r.Shadow.SpotLightReceiverBias=0.5
r.Shadow.SpotLightTransitionScale=60.0
r.Shadow.TransitionScale=60.0
r.Shadow.OcclusionCullCascadedShadowMaps=0
r.Shadow.StencilOptimization=1
r.Shadow.RecordInteractionShadowPrimitives=0
r.Shadow.PreshadowExpand=0.15
r.Shadow.PreshadowsForceLowestDetailLevel=1
r.Shadow.TexelsPerPixelRectlight=0.25
r.Shadow.WholeSceneShadowCacheMb=150
r.Shadow.CacheWholeSceneShadows=1
r.Shadow.CacheWPOPrimitives=1
r.Shadow.UnbuiltPreviewInGame=0
r.Shadow.Denoiser=0
r.Shadow.Denoiser.TemporalAccumulation=1

; Contact / capsule / DF shadows
r.ContactShadows=1
r.ContactShadows.NonShadowCastingIntensity=0.6
r.CapsuleShadows=1
r.CapsuleShadowsFullResolution=0
r.CapsuleDirectShadows=0
r.CapsuleIndirectShadows=0
r.CapsuleIndirectConeAngle=0.27
r.DFDistanceScale=0.0
r.DFFullResolution=0
r.DFShadowQuality=0
r.AllowLandscapeShadows=0
r.SupportPointLightWholeSceneShadows=1
r.AllowPointLightCubemapShadows=1
r.Shadow.EnableModulatedSelfShadow=1

;--------------------------------------------------
; 6. VOLUMETRICS / ATMOSPHERE / CLOUDS / FOG
;--------------------------------------------------
; SkyAtmosphere
r.SkyAtmosphere.AerialPerspective.DepthTest=1
r.SkyAtmosphere.DistantSkyLightLUT=1
r.SkyAtmosphere.DistantSkyLightLUT.Altitude=6.0
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.FastSkyLUT.Height=96
r.SkyAtmosphere.FastSkyLUT.SampleCountMax=24
r.SkyAtmosphere.FastSkyLUT.SampleCountMin=3
r.SkyAtmosphere.FastSkyLUT.Width=128
r.SkyAtmosphere.LUT32=0
r.SkyAtmosphere.MultiScatteringLUT.HighQuality=0
r.SkyAtmosphere.MultiScatteringLUT.SampleCount=12
r.SkyAtmosphere.SampleCountMax=24
r.SkyAtmosphere.SampleCountMin=3
r.SkyAtmosphere.SampleLightShadowmap=0

; Volumetric Fog
r.SupportExpFogMatchesVolumetricFog=1
r.Translucency.HeterogeneousVolumes=1
r.VolumetricFog.GridPixelSize=16
r.VolumetricFog.LightFunction.LightFunctionCount=8
r.VolumetricFog.HistoryWeight=0.95

; Volumetric Clouds
r.VolumetricCloud=1
r.VolumetricCloud.AllowAnalyticDerivatives=1
r.VolumetricCloud.EnableAerialPerspectiveSampling=1
r.VolumetricCloud.EnableAtmosphericLightsSampling=1
r.VolumetricCloud.EnableDistantSkyLightSampling=1
r.VolumetricCloud.EnableLocalLightsSampling=1
r.VolumetricCloud.HighQualityAerialPerspective=0
r.VolumetricCloud.DistanceToSampleMaxCount=2.0
r.VolumetricCloud.ViewRaySampleMaxCount=1200.0
r.VolumetricCloud.SampleMinCount=4
r.VolumetricCloud.SampleClampCount=2048
r.VolumetricCloud.EmptySpaceSkipping=0
r.VolumetricCloud.EmptySpaceSkipping.VolumeDepth=40
r.VolumetricCloud.StepSizeOnZeroConservativeDensity=1

; Cloud shadows
r.VolumetricCloud.ShadowMap=1
r.VolumetricCloud.ShadowMap.MaxResolution=4096
r.VolumetricCloud.ShadowMap.SnapToPixelGrid=1
r.VolumetricCloud.ShadowMap.SnapLength=20.0
r.VolumetricCloud.Shadow.ViewRaySampleMaxCount=128.0
r.VolumetricCloud.ShadowMap.RaySampleMaxCount=160.0
r.VolumetricCloud.ShadowMap.RaySampleHorizonMultiplier=4.0
r.VolumetricCloud.ShadowMap.SpatialFiltering=3
r.VolumetricCloud.ShadowMap.TemporalFiltering.NewFrameWeight=1.0
r.VolumetricCloud.Shadow.ReflectionRaySampleMaxCount=48.0

; Sky AO from clouds
r.VolumetricCloud.SkyAO=1
r.VolumetricCloud.SkyAO.MaxResolution=4096
r.VolumetricCloud.SkyAO.TraceSampleCount=20
r.VolumetricCloud.SkyAO.Filtering=3
r.VolumetricCloud.SkyAO.Intensity=1.0
r.VolumetricCloud.SkyAO.SnapLength=20.0

; Cloud reflections / local lights
r.VolumetricCloud.ReflectionRaySampleMaxCount=128.0
r.VolumetricCloud.LocalLights.ShadowSampleCount=16.0

; Volumetric render target
r.VolumetricRenderTarget=1
r.VolumetricCloud.ApplyFogOnAllPixel=1
r.VolumetricCloud.ApplyFogLate=1
r.VolumetricRenderTarget.Mode=3
r.VolumetricRenderTarget.Scale=1.0
r.VolumetricRenderTarget.UpsamplingMode=4
r.VolumetricRenderTarget.UvNoiseSampleAcceptanceWeight=20.0
r.VolumetricRenderTarget.ViewRect=1
r.VolumetricRenderTarget.ReprojectionBoxConstraint=1
r.VolumetricRenderTarget.MinimumDistanceKmToEnableReprojection=40.0
r.VolumetricRenderTarget.MinimumDistanceKmToDisableDisocclusion=5.0
r.VolumetricRenderTarget.PreferAsyncCompute=1

;--------------------------------------------------
; 7. NANITE / GEOMETRY
;--------------------------------------------------
r.Nanite=1
r.Shadow.Nanite=1
r.Nanite.AllowMaskedMaterials=1
r.Nanite.BinningTechnique=1
r.Nanite.CoarseMeshStreamingMode=2
r.Nanite.CoarseStreamingMeshMemoryPoolSizeInMB=120
r.Nanite.ComputeRasterization=1
r.Nanite.Culling.DrawDistance=1
r.Nanite.Culling.Frustum=1
r.Nanite.Culling.GlobalClipPlane=1
r.Nanite.Culling.HZB=1
r.Nanite.Culling.WPODisableDistance=1
r.Nanite.CustomDepth=1
r.Nanite.DisocclusionHack=1
r.Nanite.MaterialSortMode=1
r.Nanite.MaterialVisibility=1
r.Nanite.MaxPixelsPerEdge=1
r.Nanite.ImposterMaxPixels=0
r.Nanite.StreamOut.CacheTraversalData=0
r.Nanite.Streaming.BandwidthLimit=32
r.Nanite.Streaming.MaxPendingPages=64
r.Nanite.Streaming.MaxPageInstallsPerFrame=96
r.Nanite.Streaming.Imposters=1
r.Nanite.VSMMeshShaderRasterization=1

;--------------------------------------------------
; 8. STREAMING / VIRTUAL TEXTURES
;--------------------------------------------------
r.TextureStreaming=1
r.MeshStreaming=1
r.Streaming.FramesForFullUpdate=5
r.Streaming.NumStaticComponentsProcessedPerFrame=25
r.Streaming.MaxTempMemoryAllowed=150
r.Streaming.PoolSize=12000
r.Streaming.Boost=4.5
r.Streaming.UseAllMips=1
r.Streaming.FullyLoadUsedTextures=1
r.Streaming.UsePerTextureBias=1

r.VT.IOPriority_HighPagePri=2
r.VT.MaxContinuousUpdatesPerFrame=1
r.VT.MaxUploadsPerFrame=24
r.VT.NumGatherTasks=1
r.VT.ParallelFeedbackTasks=0
r.VT.PoolSizeScale=1
r.VT.RVT.TileCountBias=0
r.VT.SplitPhysicalPoolSize=0
r.VT.TileSize=128

