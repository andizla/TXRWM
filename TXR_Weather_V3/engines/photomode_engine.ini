; 9. LOD / VIEW DISTANCE / FOLIAGE / MISC
;--------------------------------------------------
r.ViewDistanceScale=50
r.StaticMeshLODDistanceScale=0.1
r.SkeletalMeshLODBias=-10
r.ParticleLODBias=-1

foliage.LODDistanceScale=5
foliage.MinLOD=0
foliage.MinOcclusionQueriesPerComponent=3
foliage.MaxOcclusionQueriesPerComponent=8
foliage.MinVertsToSplitNode=8192
foliage.OverestimateLOD=0
foliage.DitheredLOD=1

r.LandscapeLOD0DistributionScale=0.75
r.LandscapeLODDistributionScale=0.75

grass.DensityScale=1
grass.CullDistanceScale=5
grass.MaxInstancesPerComponent=8192
grass.MaxCreatePerFrame=64
grass.TickInterval=2

r.ShaderPipelineCache.StartupMode=3
gc.IncrementalGCTimePerFrame=0.001
RHI.SyncThreshold=999
